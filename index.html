<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Check this out</title>

  <!-- Open Graph (Messenger/Facebook Preview) -->
  <meta property="og:title" content="Check this out">
  <meta property="og:description" content="Click to view">
  <meta property="og:image" content="https://ndie669.github.io/my-share-link/aifaceswap-3094dcdad7f9ac46bb6201da981c8db8.jpg">
  <meta property="og:image:secure_url" content="https://ndie669.github.io/my-share-link/aifaceswap-3094dcdad7f9ac46bb6201da981c8db8.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta property="og:type" content="website">

  <!-- IMPORTANT: change this to your actual GitHub Pages URL -->
  <meta property="og:url" content="https://ndie669.github.io/my-share-link/">

  <!-- Optional but helps Facebook -->
  <meta property="fb:app_id" content="966242223397117">

  <!-- Twitter / fallback preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Check this out">
  <meta name="twitter:description" content="Click to view">
  <meta name="twitter:image" content="https://ndie669.github.io/my-share-link/aifaceswap-3094dcdad7f9ac46bb6201da981c8db8.jpg">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://ndie669.github.io/my-share-link/">

  <!-- Delay redirect so Messenger crawler reads metadata -->
  <meta http-equiv="refresh" content="8; url=https://www.facebook.com/reel/900485386339617">

  <script>
    // JS redirect fallback
    setTimeout(function () {
      window.location.href = "https://www.facebook.com/reel/900485386339617";
    }, 8000);
  </script>
</head>

<body>
  <h2>Redirecting...</h2>
  <p>Please wait a moment.</p>

  <!-- Visible image also helps some crawlers -->
  <img
    src="https://ndie669.github.io/my-share-link/aifaceswap-3094dcdad7f9ac46bb6201da981c8db8.jpg"
    alt="Preview"
    style="max-width:100%; height:auto;"
  >
</body>
</html>
